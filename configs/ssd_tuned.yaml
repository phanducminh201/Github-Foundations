# ============================================================
# Config — SSD300  (TUNED — Giai đoạn 5)
# Thay đổi so với baseline:
#   - lr: 0.01 → 0.001    (giảm mạnh vì baseline lr quá cao)
#   - epochs: 20 → 30     (train lâu hơn)
#   - weight_decay tăng nhẹ để giảm overfitting
# ============================================================

model:
  name: ssd300_vgg16
  backbone: vgg16
  pretrained: true

training:
  epochs: 30                         # tăng từ 20 → 30
  batch_size: 4
  image_size: 300
  optimizer: SGD
  lr: 0.001                          # giảm từ 0.01 → 0.001
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler: CosineAnnealingLR
  t_max: 30
  gradient_clip: 1.0

checkpoint:
  save_best: true
  save_last: true
  save_period: 5
  monitor: val_loss

output:
  project: runs/ssd
  name: tuned
  verbose: true
